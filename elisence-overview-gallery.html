<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elisence — Visual Overview Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #061936 0%, #020816 48%, #000 100%);
      color: #fff;
      overflow-x: hidden;
    }

    .board {
      width: 100vw;
      min-height: 100vh;
      padding: 18px 22px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header-wrap {
      position: relative;
      width: 100%;
    }

    .nav-left {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .nav-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .06em;
      text-decoration: none;
      color: #dff5ff;
      border-radius: 999px;
      border: 1px solid rgba(120, 220, 255, .85);
      background:
        radial-gradient(circle at 30% 20%, rgba(0, 220, 255, .35), transparent 55%),
        rgba(0, 80, 160, .28);
      box-shadow: 0 0 22px rgba(0, 190, 255, .55);
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .nav-pill:hover,
    .nav-pill:focus-visible {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 0 32px rgba(0, 220, 255, .85);
      outline: 2px solid rgba(0, 220, 255, .5);
      outline-offset: 2px;
    }

    .header {
      text-align: center;
      padding-top: 8px;
    }

    .brand {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 0.28em;
      color: #ffffff;
      text-shadow: 0 0 28px rgba(0,180,255,.9);
    }

    .subtitle {
      margin-top: 4px;
      font-size: 17px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #8edcff;
    }

    .description {
      margin-top: 12px;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
      font-size: clamp(15px, 1.1vw, 18px);
      line-height: 1.45;
      font-weight: 620;
      color: rgba(180, 230, 255, .88);
      padding: 0 12px;
    }

    .gallery {
      width: min(1080px, 100%);
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .slide-title {
      font-size: clamp(20px, 2vw, 26px);
      font-weight: 900;
      color: #fff;
      text-align: center;
      text-shadow: 0 0 18px rgba(0,170,255,.5);
    }

    .slide-stage {
      width: 100%;
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .nav-btn {
      flex: 0 0 auto;
      border: 1px solid rgba(95, 205, 255, .75);
      border-radius: 999px;
      background:
        radial-gradient(circle at top left, rgba(0,190,255,.34), transparent 45%),
        linear-gradient(145deg, rgba(8,34,85,.96), rgba(4,12,34,.98));
      color: #dff5ff;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .06em;
      padding: 12px 20px;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(0,160,255,.45);
      transition: .18s ease;
    }

    .nav-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 0 28px rgba(0, 210, 255, .85);
    }

    .nav-btn:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .slide-frame {
      flex: 1 1 320px;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(95, 205, 255, .45);
      border-radius: 18px;
      background: rgba(4, 12, 34, .55);
      padding: 14px;
      box-shadow: 0 0 24px rgba(0,160,255,.35);
    }

    .slide-image {
      max-width: 92vw;
      max-height: 78vh;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .slide-counter {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .12em;
      color: #55d9ff;
    }

    .slide-caption {
      max-width: 720px;
      text-align: center;
      font-size: clamp(14px, 1vw, 17px);
      line-height: 1.45;
      color: rgba(180, 230, 255, .92);
      padding: 0 12px;
    }

    .thumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      width: 100%;
      padding-top: 4px;
    }

    .thumb {
      border: 1px solid rgba(95, 205, 255, .45);
      border-radius: 12px;
      background: rgba(4, 12, 34, .7);
      padding: 6px;
      cursor: pointer;
      transition: .18s ease;
      max-width: 140px;
    }

    .thumb:hover,
    .thumb.active {
      border-color: rgba(0, 220, 255, .95);
      box-shadow: 0 0 20px rgba(0, 210, 255, .65);
    }

    .thumb img {
      display: block;
      width: 120px;
      height: 68px;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(0, 0, 0, .35);
    }

    .thumb-label {
      margin-top: 6px;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      color: rgba(180, 230, 255, .9);
      line-height: 1.2;
    }

    @media (max-width: 768px) {
      .nav-left { position: static; margin-bottom: 10px; }
      .header-wrap { display: flex; flex-direction: column; align-items: center; }
      .slide-stage { gap: 8px; }
      .slide-stage .nav-btn { padding: 10px 12px; font-size: 12px; }
      .thumb img { width: 100px; height: 56px; }
    }
  </style>
</head>
<body>
  <main class="board">
    <div class="header-wrap">
      <div class="nav-left">
        <a href="pitch-deck.html" class="nav-pill">&larr; Back to Pitch &amp; Deck</a>
      </div>
      <header class="header">
        <div class="brand">ELISENCE</div>
        <div class="subtitle">Visual Overview Gallery</div>
        <p class="description">Simple visual explanations for founder conversations, Web Summit, HLTH, investors, and healthcare partners.</p>
      </header>
    </div>

    <section class="gallery" aria-label="Visual overview slides">
      <h1 class="slide-title" id="slideTitle">Web Summit Overview</h1>

      <div class="slide-stage">
        <button type="button" class="nav-btn" id="prevBtn" aria-label="Previous slide">Previous</button>

        <div class="slide-frame">
          <img
            class="slide-image"
            id="slideImage"
            src="assets/websummit2026/ELISENCE_WEB_SUMMIT_OVERVIEW.png"
            alt="Elisence Web Summit one-slide overview"
          />
          <div class="slide-counter" id="slideCounter">1 / 3</div>
        </div>

        <button type="button" class="nav-btn" id="nextBtn" aria-label="Next slide">Next</button>
      </div>

      <p class="slide-caption" id="slideCaption">
        A simple one-slide explanation of Elisence as a global digital health and humanity platform.
      </p>

      <div class="thumbs" id="thumbs" role="tablist" aria-label="Slide thumbnails"></div>
    </section>
  </main>

  <script>
    const slides = [
      {
        title: "Web Summit Overview",
        image: "assets/websummit2026/ELISENCE_WEB_SUMMIT_OVERVIEW.png",
        alt: "Elisence Web Summit one-slide overview",
        caption: "A simple one-slide explanation of Elisence as a global digital health and humanity platform."
      },
      {
        title: "Elisence Vision",
        image: "assets/websummit2026/Elisence_Vision_Slide_01.png",
        alt: "Elisence Vision overview slide",
        caption: "A connected social health network where prevention, support, AI assistance, care, and real-world health experiences come together."
      },
      {
        title: "Real Health Experiences",
        image: "assets/websummit2026/Elisence_Real_Health_Experiences_Slide_02.png",
        alt: "Elisence real health experiences mobile product slide",
        caption: "Real mobile product direction showing everyday health experiences, including women's health, diabetes and metabolic health, continuity, and support."
      }
    ];

    let index = 0;

    const slideTitle = document.getElementById("slideTitle");
    const slideImage = document.getElementById("slideImage");
    const slideCaption = document.getElementById("slideCaption");
    const slideCounter = document.getElementById("slideCounter");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const thumbsEl = document.getElementById("thumbs");

    function renderThumbs() {
      thumbsEl.innerHTML = "";
      slides.forEach((slide, i) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "thumb" + (i === index ? " active" : "");
        btn.setAttribute("role", "tab");
        btn.setAttribute("aria-selected", i === index ? "true" : "false");
        btn.setAttribute("aria-label", slide.title);
        btn.innerHTML = `
          <img src="${slide.image}" alt="" />
          <div class="thumb-label">${slide.title}</div>
        `;
        btn.onclick = () => goTo(i);
        thumbsEl.appendChild(btn);
      });
    }

    function goTo(i) {
      index = (i + slides.length) % slides.length;
      const slide = slides[index];
      slideTitle.textContent = slide.title;
      slideImage.src = slide.image;
      slideImage.alt = slide.alt;
      slideCaption.textContent = slide.caption;
      slideCounter.textContent = `${index + 1} / ${slides.length}`;
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === slides.length - 1;
      renderThumbs();
    }

    prevBtn.addEventListener("click", () => goTo(index - 1));
    nextBtn.addEventListener("click", () => goTo(index + 1));

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") goTo(index - 1);
      if (e.key === "ArrowRight") goTo(index + 1);
    });

    goTo(0);
  </script>
</body>
</html>
