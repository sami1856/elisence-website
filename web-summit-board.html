const grid = document.getElementById("grid");

items.forEach((item, index) => {
  const card = document.createElement("button");
  card.className = "card";
  card.onclick = () => openModal(index);
  card.innerHTML = `
    <div class="num">${item.n}</div>
    <div class="q">${item.short}</div>
    <div class="tag">${item.question}</div>
  `;
  grid.appendChild(card);
});

function openModal(index) {
  const item = items[index];

  const mainAnswer = item.answer.map(p => `<p>${p}</p>`).join("");

  const followups = item.followups
    ? item.followups.map(f => `
        <div class="followup">
          <div class="followup-q">Possible follow-up: ${f.q}</div>
          <div class="followup-a">${f.a}</div>
        </div>
      `).join("")
    : "";

  document.getElementById("modalTitle").textContent = item.n + " — " + item.title;
  document.getElementById("modalAnswer").innerHTML = mainAnswer + followups;
  document.getElementById("modalKeywords").innerHTML = item.keywords.map(k => `<span class="chip">${k}</span>`).join("");
  document.getElementById("modal").classList.add("show");
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});
