      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      line-height: 1;
      font-weight: 900;
      color: #fff;
      background:

      color: #eaf8ff;

      color: #55d9ff;

      color: #fff;
      line-height: 1.15;

      font-size: 14px;
      line-height: 1.35;
      font-weight: 650;
      color: rgba(180, 230, 255, .88);

        padding: 16px 16px;

      .clear-btn {
        padding: 12px 14px;
        min-width: 86px;
        flex: 0 0 auto;
      }
    }

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function normalizeText(value) {
  return String(value || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^\w\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function queryTokensFromNormalized(normalized) {
  return normalized.split(/\s+/).filter(Boolean);
}

function aliasTriggerMatches(normalized, trigger) {
  const t = normalizeText(trigger);

  if (t.includes(" ")) {

  }

  if (tokens.some((w) => w === t)) return true;

  if (t.length >= 4) {
    return tokens.some((w) => {
      if (w === t) return true;
      if (w.startsWith(t)) return true;
      if (t.startsWith(w) && w.length >= 4) return true;
      return false;
    });
  }

  return false;
}

  if (!normalized) return boosts;

  ALIAS_RULES.forEach((rule) => {
    const hit = rule.triggers.some((trigger) => aliasTriggerMatches(normalized, trigger));
    if (!hit) return;

    const cardNumbers = rule.boostCardNumbers || [];
    cardNumbers.forEach((cardNumber) => {
      const idx = resolveCardIndex(cardNumber);
      if (idx >= 0) {
        boosts.set(idx, (boosts.get(idx) || 0) + 120);
      }
    });
  });

  return boosts;
}

function buildSearchText(item) {
  const parts = [
    item.n,
    item.title,
    item.short,
    item.question,
    ...(item.keywords || []),
    ...(item.answer || [])
  ];
  if (item.followups) {
    item.followups.forEach((f) => {
      parts.push(f.q, f.a);
    });
  }
  return normalizeText(parts.join(" "));
}

function scoreField(text, queryWords, fullPhrase, weight) {
  const norm = normalizeText(text);
  if (!norm) return 0;

  let score = 0;
  if (fullPhrase.length >= 2 && norm.includes(fullPhrase)) {
    score += weight * 0.55;
  }

  let matchedWords = 0;
  queryWords.forEach((word) => {
    if (word.length < 2 && !/^\d+$/.test(word)) return;
    if (norm.includes(word)) {
      score += weight * 0.18;
      matchedWords += 1;
    }
    norm.split(/\s+/).forEach((token) => {
      if (token.startsWith(word) && word.length >= 2) {
        score += weight * 0.12;
      }
    });
  });

  if (queryWords.length > 1 && matchedWords === queryWords.length) {
    score += weight * 0.22;
  }

  return score;
}

function scoreItem(item, index, query) {
  const fullPhrase = normalizeText(query);
  if (!fullPhrase) return 0;

  const expanded = expandAliases(query);
  const queryWords = Array.from(
    new Set(
      expanded
        .split(/\s+/)
        .concat(fullPhrase.split(/\s+/))
        .filter((w) => w.length > 0)
    )
  );

  let score = 0;
  score += scoreField(item.short, queryWords, fullPhrase, 108);
  score += scoreField(item.title, queryWords, fullPhrase, 92);
  score += scoreField(item.question, queryWords, fullPhrase, 78);
  score += scoreField((item.keywords || []).join(" "), queryWords, fullPhrase, 76);
  score += scoreField((item.answer || []).join(" "), queryWords, fullPhrase, 24);

  if (item.followups) {
    item.followups.forEach((f) => {
      score += scoreField(f.q + " " + f.a, queryWords, fullPhrase, 24);
    });
  }

  if (fullPhrase.length >= 2) {
    const titleNorm = normalizeText(item.title);
    const shortNorm = normalizeText(item.short);
    const questionNorm = normalizeText(item.question);
    const keywordsNorm = normalizeText((item.keywords || []).join(" "));
    if (titleNorm.includes(fullPhrase)) score += 55;
    if (shortNorm.includes(fullPhrase)) score += 50;
    if (questionNorm.includes(fullPhrase)) score += 40;
    if (keywordsNorm.includes(fullPhrase)) score += 35;
  }

  const nNorm = item.n.replace(/^0+/, "") || item.n;
  queryWords.forEach((word) => {
    if (word === nNorm || word === item.n) {
      score += 200;
    }
    if (/^\d+$/.test(word) && (nNorm === word || item.n === word.padStart(2, "0"))) {
      score += 200;
    }
  });

  const aliasBoosts = getAliasBoostIndices(query);
  if (aliasBoosts.has(index)) {
    score += aliasBoosts.get(index);
  }

  const corpus = buildSearchText(item);
  if (corpus.includes(fullPhrase)) {
    score += 35;
  }

  return score;
}

function getSearchResults(query) {
  const trimmed = (query || "").trim();
  if (!trimmed) {
    return items.map((item, index) => ({ index, item, score: 0 }));
  }

  const scored = items
    .map((item, index) => ({
      index,
      item,
      score: scoreItem(item, index, trimmed)
    }))
    .filter((row) => row.score > 0)
    .sort((a, b) => b.score - a.score || Number(a.item.n) - Number(b.item.n));

  return scored;
}

function isStrongSingleResult(results) {
  if (!results.length) return false;
  if (results.length === 1) return results[0].score >= 35;
  const top = results[0].score;
  const second = results[1].score;
  return top >= 50 && top >= second * 1.4 && top - second >= 12;
}

function renderGrid(results) {
  grid.innerHTML = "";
  const list = results && results.length
    ? results
    : items.map((item, index) => ({ index, item, score: 0 }));

  list.forEach(({ index, item }) => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "card";
    card.onclick = () => openModal(index);
    card.innerHTML = `
      <div class="num">${escapeHtml(item.n)}</div>
      <div class="q">${escapeHtml(item.short)}</div>
      <div class="tag">${escapeHtml(item.question)}</div>
    `;
    grid.appendChild(card);
  });
}

function renderSuggestions(results) {
  suggestionsEl.innerHTML = "";
  if (!results.length || !searchInput.value.trim()) {
    suggestionsEl.classList.remove("show");
    return;
  }

  results.slice(0, 8).forEach((row) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "suggestion";
    btn.setAttribute("role", "option");
    btn.innerHTML = `
      <div class="suggestion-num">${escapeHtml(row.item.n)}</div>
      <div class="suggestion-short">${escapeHtml(row.item.short)}</div>
      <div class="suggestion-q">${escapeHtml(row.item.question)}</div>
    `;
    btn.onclick = () => {
      openModal(row.index);
    };
    suggestionsEl.appendChild(btn);
  });

  suggestionsEl.classList.add("show");
}

function applySearch(query, options = {}) {
  const { openTopIfStrong = false, openTopOnEnter = false } = options;
  const trimmed = (query || "").trim();

  clearBtn.hidden = !trimmed;

  if (!trimmed) {
    lastSearchResults = items.map((item, index) => ({ index, item, score: 0 }));
    renderGrid(lastSearchResults);
    renderSuggestions([]);
    return lastSearchResults;
  }

  lastSearchResults = getSearchResults(trimmed);
  renderGrid(lastSearchResults);
  renderSuggestions(lastSearchResults);

  if (openTopOnEnter || openTopIfStrong) {
    if (lastSearchResults.length && (openTopOnEnter || isStrongSingleResult(lastSearchResults))) {
      openModal(lastSearchResults[0].index);
    }
  }

  return lastSearchResults;
}

function clearSearch() {
  searchInput.value = "";
  clearBtn.hidden = true;
  stopVoiceSearch();
  voiceStatus.hidden = true;
  lastSearchResults = items.map((item, index) => ({ index, item, score: 0 }));
  renderGrid(lastSearchResults);
  renderSuggestions([]);
  searchInput.focus();
}

function openModal(index) {
  const item = items[index];
  if (!item) return;

  const mainAnswer = item.answer.map((p) => `<p>${escapeHtml(p)}</p>`).join("");

  const followups = item.followups
    ? item.followups.map((f) => `
        <div class="followup">
          <div class="followup-q">Possible follow-up: ${escapeHtml(f.q)}</div>
          <div class="followup-a">${escapeHtml(f.a)}</div>
        </div>
      `).join("")
    : "";

  document.getElementById("modalTitle").textContent = item.n + " — " + item.title;
  document.getElementById("modalAnswer").innerHTML = mainAnswer + followups;
  document.getElementById("modalKeywords").innerHTML = item.keywords
    .map((k) => `<span class="chip">${escapeHtml(k)}</span>`)
    .join("");
  modalEl.classList.add("show");
}

function closeModal() {
  modalEl.classList.remove("show");
}

function initVoiceSearch() {
  if (!SpeechRecognitionCtor) {
    voiceUnsupported.hidden = false;
    voiceUnsupported.textContent =
      "Voice search is not supported on this browser. Please type a few words.";
    voiceBtn.disabled = true;
    voiceBtn.style.opacity = "0.55";
    return;
  }

  speechRecognition = new SpeechRecognitionCtor();
  speechRecognition.continuous = false;
  speechRecognition.interimResults = false;
  speechRecognition.lang = "en-GB";

  speechRecognition.onstart = () => {
    voiceListening = true;
    voiceBtn.classList.add("listening");
    voiceStatus.hidden = false;
    voiceStatus.textContent = "Listening...";
    voiceUnsupported.hidden = true;
  };

  speechRecognition.onresult = (event) => {
    const transcript = Array.from(event.results)
      .map((r) => r[0].transcript)
      .join(" ")
      .trim();
    if (transcript) {
      searchInput.value = transcript;
      applySearch(transcript, { openTopIfStrong: true });
    }
  };

  speechRecognition.onerror = () => {
    stopVoiceSearch();
    voiceStatus.textContent = "Voice input ended. Try again or type your search.";
  };

  speechRecognition.onend = () => {
    stopVoiceSearch();
  };
}

function startVoiceSearch() {
  if (!SpeechRecognitionCtor) {
    voiceUnsupported.hidden = false;
    voiceUnsupported.textContent =
      "Voice search is not supported on this browser. Please type a few words.";
    return;
  }

  if (!speechRecognition) initVoiceSearch();

  try {
    if (voiceListening) {
      stopVoiceSearch();
      return;
    }
    speechRecognition.start();
  } catch (err) {
    voiceStatus.hidden = false;
    voiceStatus.textContent = "Could not start microphone. Please type your search.";
    stopVoiceSearch();
  }
}

function stopVoiceSearch() {
  voiceListening = false;
  voiceBtn.classList.remove("listening");
  if (speechRecognition) {
    try {
      speechRecognition.stop();
    } catch (err) {
      /* ignore */
    }
  }
}

searchInput.addEventListener("input", () => {
  applySearch(searchInput.value);
});

searchInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    applySearch(searchInput.value, { openTopOnEnter: true });
  }
});

clearBtn.addEventListener("click", clearSearch);
voiceBtn.addEventListener("click", startVoiceSearch);

document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  if (modalEl.classList.contains("show")) {
    closeModal();
    return;
  }
  if (searchInput.value.trim()) {
    clearSearch();
  }
});

renderGrid(items.map((item, index) => ({ index, item, score: 0 })));
initVoiceSearch();
  </script>
  <!-- force rebuild -->
</body>
