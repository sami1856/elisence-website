<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elisence — Investor Deck System</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #061936 0%, #020816 48%, #000 100%);
      color: #fff;
      overflow-y: auto;
    }

    .board {
      width: 100vw;
      min-height: 100vh;
      padding: 18px 22px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header-wrap {
      position: relative;
      flex: 0 0 auto;
      width: 100%;
    }

    .nav-left {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
      display: inline-flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .06em;
      text-decoration: none;
      color: #dff5ff;
      border-radius: 999px;
      border: 1px solid rgba(120, 220, 255, .85);
      background:
        radial-gradient(circle at 30% 20%, rgba(0, 220, 255, .35), transparent 55%),
        rgba(0, 80, 160, .28);
      box-shadow: 0 0 22px rgba(0, 190, 255, .55);
      transition: transform .15s ease, box-shadow .15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-pill:hover,
    .nav-pill:focus-visible {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 0 32px rgba(0, 220, 255, .85);
      outline: 2px solid rgba(0, 220, 255, .5);
      outline-offset: 2px;
    }

    .header {
      text-align: center;
      flex: 0 0 auto;
    }

    .brand {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 0.28em;
      color: #ffffff;
      text-shadow: 0 0 28px rgba(0,180,255,.9);
    }

    .subtitle {
      margin-top: 4px;
      font-size: 17px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #8edcff;
    }

    .description {
      margin-top: 12px;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
      font-size: clamp(15px, 1.1vw, 18px);
      line-height: 1.45;
      font-weight: 620;
      color: rgba(180, 230, 255, .88);
      padding: 0 12px;
    }

    .grid {
      flex: 0 0 auto;
      width: min(1280px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 1fr;
      gap: 18px;
      align-content: start;
    }

    .card {
      border: 1px solid rgba(95, 205, 255, .75);
      border-radius: 22px;
      background:
        radial-gradient(circle at top left, rgba(0,190,255,.34), transparent 45%),
        linear-gradient(145deg, rgba(8,34,85,.96), rgba(4,12,34,.98));
      box-shadow:
        0 0 22px rgba(0,160,255,.65),
        inset 0 0 20px rgba(255,255,255,.04);
      padding: 16px;
      min-height: 158px;
      height: 100%;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: .18s ease;
    }

    .card:hover {
      transform: translateY(-3px) scale(1.015);
      box-shadow:
        0 0 34px rgba(0, 210, 255, .95),
        0 0 70px rgba(80, 80, 255, .45);
    }

    .num {
      font-size: 17px;
      font-weight: 900;
      color: #55d9ff;
      letter-spacing: .12em;
      text-align: center;
    }

    .q {
      font-size: clamp(16px, 1.18vw, 23px);
      line-height: 1.06;
      font-weight: 900;
      color: #ffffff;
      text-align: center;
      text-shadow: 0 0 18px rgba(0,170,255,.5);
    }

    .tag {
      margin-top: 12px;
      font-size: 13.5px;
      line-height: 1.35;
      font-weight: 650;
      color: rgba(180, 230, 255, .9);
      opacity: .94;
      text-align: center;
      letter-spacing: .01em;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 34px;
      background: rgba(0, 0, 0, .82);
      backdrop-filter: blur(12px);
    }

    .modal.show { display: flex; }

    .panel {
      position: relative;
      width: min(1500px, 96vw);
      height: min(850px, 92vh);
      border-radius: 34px;
      border: 1px solid rgba(110, 220, 255, .9);
      background:
        radial-gradient(circle at top, rgba(0,160,255,.28), transparent 42%),
        linear-gradient(145deg, #06193a, #020716 72%);
      box-shadow:
        0 0 55px rgba(0,190,255,.8),
        0 0 140px rgba(90,80,255,.45);
      padding: 34px 42px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      overflow: hidden;
    }

    .modal-top {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 16px;
      flex: 0 0 auto;
      padding-right: 4px;
    }

    .modal-title {
      font-size: clamp(34px, 3.2vw, 58px);
      line-height: 1.08;
      font-weight: 950;
      color: #fff;
      padding-right: 8px;
      word-break: break-word;
    }

    .close {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      min-width: 56px;
      min-height: 56px;
      padding: 0;
      border: 1px solid rgba(120, 220, 255, .95);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      line-height: 1;
      font-weight: 900;
      color: #fff;
      background:
        radial-gradient(circle at 30% 25%, rgba(0, 220, 255, .4), transparent 55%),
        rgba(0, 120, 200, .35);
      cursor: pointer;
      box-shadow:
        0 0 24px rgba(0, 190, 255, .75),
        inset 0 0 12px rgba(255, 255, 255, .06);
      transition: transform .15s ease, box-shadow .15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .close:hover,
    .close:focus-visible {
      transform: scale(1.05);
      box-shadow: 0 0 32px rgba(0, 220, 255, .95);
      outline: 2px solid rgba(0, 220, 255, .6);
      outline-offset: 2px;
    }

    .close:active { transform: scale(0.97); }

    .answer {
      flex: 1;
      overflow-y: auto;
      padding-right: 8px;
      font-size: clamp(28px, 2.15vw, 42px);
      line-height: 1.32;
      font-weight: 650;
      color: #eaf8ff;
    }

    .answer p { margin-bottom: 22px; }

    .placeholder-note {
      color: rgba(180, 230, 255, .75);
      font-style: italic;
    }

    .deck-subtitle {
      font-size: clamp(20px, 1.45vw, 30px);
      line-height: 1.22;
      font-weight: 850;
      color: #8edcff;
      margin-bottom: 20px;
      letter-spacing: .04em;
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; width: min(720px, 100%); }
      .card { min-height: 150px; }
      .modal { padding: 12px; }
      .panel { padding: 22px 18px; height: min(92vh, 92dvh); }
      .close { width: 52px; height: 52px; min-width: 52px; min-height: 52px; font-size: 32px; }
    }

    @media (max-width: 768px) {
      .nav-pill { align-self: flex-start; margin-bottom: 10px; font-size: 12px; padding: 9px 14px; }
      .nav-left { position: static; align-self: flex-start; margin-bottom: 10px; }
      .header-wrap { display: flex; flex-direction: column; align-items: center; }
    }
  </style>
</head>

<body>
  <main class="board">
    <div class="header-wrap">
      <div class="nav-left">
        <a href="web-summit-board.html" class="nav-pill">&larr; Founder Quick Board</a>
        <a href="pitch-system.html" class="nav-pill">&larr; Pitch System</a>
      </div>
      <header class="header">
        <div class="brand">ELISENCE</div>
        <div class="subtitle">Investor Deck System</div>
        <p class="description">Slide-by-slide investor story structure for Elisence.</p>
      </header>
    </div>

    <section class="grid" id="grid"></section>
  </main>

  <div class="modal" id="modal">
    <div class="panel">
      <div class="modal-top">
        <div class="modal-title" id="modalTitle"></div>
        <button type="button" class="close" onclick="closeModal()" aria-label="Close">&times;</button>
      </div>
      <div class="answer" id="modalAnswer"></div>
    </div>
  </div>

  <script>
const items = [
  { n:"01", title:"Cover", short:"Deck opening identity and positioning" },
  { n:"02", title:"Problem", short:"Fragmentation and system pressure" },
  { n:"03", title:"Why Now", short:"Turning point and timing" },
  { n:"04", title:"What is Elisence", short:"One connected ecosystem" },
  { n:"05", title:"Why Elisence is Different", short:"Continuity, trust, and modular thinking" },
  { n:"06", title:"Product Ecosystem", short:"Connected health experiences" },
  { n:"07", title:"Trust, Safety & Governance", short:"Built for trust and compliance" },
  { n:"08", title:"Business Model", short:"Trust-first routes and partnerships" },
  { n:"09", title:"Market & Expansion", short:"Global ambition, local execution" },
  { n:"10", title:"Founder Story", short:"Why Elisence exists" },
  { n:"11", title:"Vision / Closing", short:"Connected future for health" },
  { n:"12", title:"Ask / Next Step", short:"Clear next step for the room" }
];

const grid = document.getElementById("grid");
const modalEl = document.getElementById("modal");

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function renderGrid() {
  grid.innerHTML = "";
  items.forEach((item, index) => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "card";
    card.onclick = () => openModal(index);
    card.innerHTML = `
      <div class="num">${escapeHtml(item.n)}</div>
      <div class="q">${escapeHtml(item.title)}</div>
      <div class="tag">${escapeHtml(item.short)}</div>
    `;
    grid.appendChild(card);
  });
}

function openModal(index) {
  const item = items[index];
  document.getElementById("modalTitle").textContent = item.n + " — " + item.title;
  if (item.n === "01") {
    document.getElementById("modalAnswer").innerHTML =
      '<p class="deck-subtitle">Investor deck opening identity and positioning</p>' +
      '<p style="margin-bottom: 10px; font-weight: 950; letter-spacing: .22em; text-transform: uppercase; text-align: center;">ELISENCE</p>' +
      '<p style="margin-bottom: 10px; font-weight: 900; text-align: center;">Human-Centred Connected Health Ecosystem</p>' +
      '<p style="margin-bottom: 22px; font-weight: 850; color: rgba(180, 230, 255, .92); text-align: center;">Prevention • Continuity • Trusted Health Intelligence</p>' +
      '<p style="margin-bottom: 14px; text-align: center;">Building a more connected, trusted, and human future for healthcare</p>' +
      '<p style="margin-bottom: 0; text-align: center; color: rgba(180, 230, 255, .88);">Global ambition • Local adaptability • Multilingual • Healthcare-aware</p>' +
      '<p class="placeholder-note" style="margin-top: 28px; padding-top: 22px; border-top: 1px solid rgba(120, 210, 255, .24); font-style: italic; text-align: center;">5-second investor impression → trust → healthcare maturity → global ambition</p>';
  } else if (item.n === "02") {
    document.getElementById("modalTitle").textContent = item.n + " — Healthcare Feels Fragmented";
    document.getElementById("modalAnswer").innerHTML =
      '<p class="deck-subtitle">Fragmentation, rising costs, and growing system pressure</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">For People</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Health journeys are fragmented across disconnected apps, appointments, medications, trackers, and systems.</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Many people are expected to manage diabetes, prevention, chronic conditions, wellbeing, family care, and medication across multiple tools — often paying for different subscriptions with little continuity.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Health can feel confusing, stressful, isolating, expensive, and difficult to navigate.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">For Healthcare Systems</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Healthcare systems face growing pressure from chronic disease, ageing populations, workforce strain, fragmented care journeys, and rising costs.</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Prevention, continuity, trusted participation, and long-term engagement are becoming increasingly important.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Better coordination and continuity may help reduce inefficiency, duplication, and avoidable healthcare burden over time.</p>' +
      '<p style="margin-bottom: 0; font-weight: 850; text-align: center;">Healthcare should feel more connected, understandable, affordable, and human.</p>' +
      '<p class="placeholder-note" style="margin-top: 28px; padding-top: 22px; border-top: 1px solid rgba(120, 210, 255, .24); font-style: italic; text-align: center;">Fragmentation → cost → system pressure → prevention gap → continuity</p>';
  } else if (item.n === "03") {
    document.getElementById("modalAnswer").innerHTML =
      '<p class="deck-subtitle">A turning point in healthcare and human expectations</p>' +
      '<p style="margin-bottom: 8px; font-weight: 850;">Healthcare is changing.</p>' +
      '<p style="margin-bottom: 18px; padding-left: 8px;">• Chronic conditions are rising, populations are ageing, healthcare systems face workforce and cost pressures, and prevention is becoming increasingly important.</p>' +
      '<p style="margin-bottom: 8px; font-weight: 850;">People are also changing.</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Individuals are expected to manage more of their own health — from medication, prevention, diabetes, wellbeing, and family care to everyday health decisions.</p>' +
      '<p style="margin-bottom: 20px; padding-left: 8px;">• Yet the experience remains fragmented, reactive, and difficult to navigate.</p>' +
      '<p style="margin-bottom: 8px; font-weight: 850;">Technology is finally mature enough to help.</p>' +
      '<p style="margin-bottom: 20px; padding-left: 8px;">• Better digital tools, intelligent systems, and connected experiences now make it possible to support continuity, prevention, and trusted long-term health engagement in more meaningful ways.</p>' +
      '<p style="margin-bottom: 8px; font-weight: 850;">This creates an important shift.</p>' +
      '<p style="margin-bottom: 24px; text-align: center;">From reactive → preventive<br>From episodic → continuous<br>From fragmented → connected</p>' +
      '<p style="margin-bottom: 0; font-weight: 850; text-align: center;">We believe healthcare is reaching a turning point — and Elisence is designed for what comes next.</p>' +
      '<p class="placeholder-note" style="margin-top: 28px; padding-top: 22px; border-top: 1px solid rgba(120, 210, 255, .24); font-style: italic; text-align: center;">Pressure → behaviour change → technology maturity → timing</p>';
  } else if (item.n === "04") {
    document.getElementById("modalAnswer").innerHTML =
      '<p class="deck-subtitle">A connected health ecosystem for people and healthcare systems</p>' +
      '<p style="margin-bottom: 18px;">Elisence is a human-centred, globally adaptable health ecosystem designed to make healthcare feel more connected, understandable, and easier to navigate.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">For People</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Elisence brings many parts of health into one connected experience — including prevention, diabetes and metabolic health, medical tracking, medication continuity, medical intelligence, body scan and body understanding, weight and wellbeing journeys, women’s health, family care, trusted guidance, doctor–patient communication, and social health experiences including voice chat, video chat, and audio chat.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Instead of using multiple fragmented tools, Elisence is designed to help people manage health with more continuity, clarity, trust, lower everyday friction, and lower health-management cost.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">For Healthcare Systems</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Elisence is designed to support better continuity, prevention, participation, and more connected health experiences across clinics, hospitals, insurers, governments, universities, researchers, pharmacies, and responsible healthcare organisations.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• It is intended to help people, professionals, and institutions work with a clearer long-term health picture rather than disconnected snapshots.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">Built for Real-World Healthcare</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Behind the scenes, Elisence is designed as a secure, modular, multilingual, and healthcare-aware platform — adaptable across countries, regulations, and different healthcare expectations.</p>' +
      '<p style="margin-bottom: 0; font-weight: 850; text-align: center;">One connected ecosystem for more human, trusted, and continuous healthcare.</p>' +
      '<p class="placeholder-note" style="margin-top: 28px; padding-top: 22px; border-top: 1px solid rgba(120, 210, 255, .24); font-style: italic; text-align: center;">Connected health → continuity → intelligence → communication → people + systems</p>';
  } else if (item.n === "05") {
    document.getElementById("modalAnswer").innerHTML =
      '<p class="deck-subtitle">Beyond isolated apps — toward connected health continuity</p>' +
      '<p style="margin-bottom: 14px; font-weight: 850;">Most digital health tools solve one problem at a time.</p>' +
      '<p style="margin-bottom: 10px; padding-left: 8px;">• One app for tracking.</p>' +
      '<p style="margin-bottom: 10px; padding-left: 8px;">• One for medication.</p>' +
      '<p style="margin-bottom: 10px; padding-left: 8px;">• One for diabetes.</p>' +
      '<p style="margin-bottom: 10px; padding-left: 8px;">• One for women’s health.</p>' +
      '<p style="margin-bottom: 10px; padding-left: 8px;">• One for wellbeing.</p>' +
      '<p style="margin-bottom: 10px; padding-left: 8px;">• One for communication.</p>' +
      '<p style="margin-bottom: 18px; padding-left: 8px;">• One for appointments.</p>' +
      '<p style="margin-bottom: 10px; font-weight: 850;">The result is fragmentation.</p>' +
      '<p style="margin-bottom: 20px; padding-left: 8px;">• Health becomes scattered across disconnected tools, subscriptions, and experiences with limited continuity and little long-term understanding.</p>' +
      '<p style="margin-bottom: 10px; font-weight: 850;">Elisence is built differently.</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Rather than building another isolated health app, Elisence is designed as a connected ecosystem where prevention, diabetes, metabolic and weight journeys, medical tracking, medication continuity, medical intelligence, body scan and body understanding, wellbeing, women’s health, trusted guidance, doctor–patient communication, and social health experiences including voice chat, video chat, and audio chat can work together.</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Elisence is designed for continuity — helping health feel connected over time rather than episodic and reactive.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• It combines human-centred experiences with healthcare-aware thinking, modular architecture, international adaptability, trust-first design, and better long-term continuity between people and healthcare systems.</p>' +
      '<p style="margin-bottom: 0; font-weight: 850; text-align: center;">Not another health app — a connected ecosystem for long-term health continuity.</p>' +
      '<p class="placeholder-note" style="margin-top: 28px; padding-top: 22px; border-top: 1px solid rgba(120, 210, 255, .24); font-style: italic; text-align: center;">Fragmented tools → disconnected care → continuity gap → connected ecosystem</p>';
  } else if (item.n === "06") {
    document.getElementById("modalAnswer").innerHTML =
      '<p class="deck-subtitle">Connected health experiences — not disconnected tools</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">Everyday Health &amp; Prevention</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Prevention, wellbeing, environment and lifestyle awareness, medical tracking, and trusted everyday health support.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">Medical &amp; Long-Term Health Journeys</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Diabetes and metabolic health, weight journeys, medication continuity, chronic condition support, doctor–patient communication, and long-term care continuity.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">Health Intelligence Layer</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Medical intelligence, trusted guidance, body scan and body understanding, and more connected long-term health insight.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">Human &amp; Social Health Layer</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Family care, social health experiences, and trusted communication through voice chat, video chat, and audio chat.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">Healthcare Ecosystem Layer</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Designed to support better continuity and participation across clinics, hospitals, insurers, governments, universities, researchers, pharmacies, and responsible healthcare organisations.</p>' +
      '<p style="margin-bottom: 0; font-weight: 850; text-align: center;">One connected ecosystem where health experiences work together instead of remaining fragmented.</p>' +
      '<p class="placeholder-note" style="margin-top: 28px; padding-top: 22px; border-top: 1px solid rgba(120, 210, 255, .24); font-style: italic; text-align: center;">Prevention → care → intelligence → communication → continuity</p>';
  } else if (item.n === "07") {
    document.getElementById("modalAnswer").innerHTML =
      '<p class="deck-subtitle">Built for trust — not added later</p>' +
      '<p style="margin-bottom: 18px; font-weight: 850;">Trust is foundational to Elisence.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• We do not treat privacy, safety, governance, and compliance as features added at the end — they are designed into the platform from the beginning.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">Safety by Design</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Elisence is designed around healthcare-aware safety thinking, responsible boundaries, and human oversight.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Citizen experiences are designed to remain non-diagnostic by default, with clear safety boundaries, uncertainty handling, escalation paths, and trusted guidance rather than unsafe autonomy.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">Zero-Trust Architecture</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Elisence follows a Zero-Trust approach — permissions, identity, access, consent, and data visibility are validated rather than assumed.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Users remain in control of sharing, while professional and institutional access is permissioned, role-based, and auditable.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">Governance, Provenance &amp; Accountability</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Elisence is designed with auditability, traceability, provenance, and tamper-evident governance in mind — including permission-aware access, evidence-driven workflows, and append-only audit principles.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• We believe trust requires systems that can explain how decisions, outputs, and data flows happened over time.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">International Healthcare Readiness</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Elisence is designed with international healthcare expectations in mind — inspired by NHS-style clinical safety thinking, GDPR/UK GDPR privacy expectations, FDA CDS boundaries, EU MDR principles, and GCC healthcare realities.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">Built to Fail Safely</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Safety matters more than false certainty. Elisence is designed to behave conservatively, explain uncertainty, restrict unsafe access, and fail safely rather than overclaim confidence.</p>' +
      '<p style="margin-bottom: 0; font-weight: 850; text-align: center;">Compliance is not paperwork. Trust is architecture.</p>' +
      '<p class="placeholder-note" style="margin-top: 28px; padding-top: 22px; border-top: 1px solid rgba(120, 210, 255, .24); font-style: italic; text-align: center;">Safety → trust → governance → accountability → healthcare readiness</p>';
  } else {
    document.getElementById("modalAnswer").innerHTML =
      '<p class="deck-subtitle">Deck slide skeleton</p>' +
      '<p class="placeholder-note">Deck slide content will be drafted next.</p>';
  }
  modalEl.classList.add("show");
}

function closeModal() {
  modalEl.classList.remove("show");
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && modalEl.classList.contains("show")) closeModal();
});

renderGrid();
  </script>
