function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function normalizeText(value) {
  return String(value || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^\w\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

const ALIAS_RULES = [
  { triggers: ["cover", "opening"], expand: ["cover", "opening", "identity"] },
  { triggers: ["problem", "fragmentation", "fragmented"], expand: ["problem", "fragmentation", "fragmented", "pressure"] },
  { triggers: ["why now", "timing", "turning point"], expand: ["why", "now", "timing", "turning"] },
  { triggers: ["what is elisence", "what is"], expand: ["what", "elisence", "ecosystem"] },
  { triggers: ["different", "competitors", "competitor", "moat"], expand: ["different", "competitors", "continuity", "ecosystem"] },
  { triggers: ["product", "ecosystem"], expand: ["product", "ecosystem", "experiences"] },
  { triggers: ["trust", "safety", "governance", "compliance"], expand: ["trust", "safety", "governance", "compliance"] },
  { triggers: ["business", "money", "revenue", "monetisation", "monetization", "b2b", "b2c"], expand: ["business", "money", "revenue", "model", "partnerships"] },
  { triggers: ["market", "global", "expansion", "local"], expand: ["market", "global", "expansion", "local", "scale"] },
  { triggers: ["founder", "story", "elisa"], expand: ["founder", "story", "mission", "background"] },
  { triggers: ["vision", "closing", "close"], expand: ["vision", "closing", "continuous", "future"] },
  { triggers: ["ask", "next step", "next"], expand: ["ask", "next", "step", "validation", "partnership"] }
];

function expandAliases(query) {
  const normalized = normalizeText(query);
  if (!normalized) return "";
  const words = new Set(normalized.split(/\s+/).filter(Boolean));
  words.add(normalized);

  ALIAS_RULES.forEach((rule) => {
    const hit = rule.triggers.some((trigger) => {
      const t = normalizeText(trigger);
      if (!t) return false;
      if (normalized.includes(t)) return true;
      return normalized.split(/\s+/).some((w) => w.startsWith(t) || t.startsWith(w));
    });
    if (hit) rule.expand.forEach((term) => words.add(normalizeText(term)));
  });

  return Array.from(words).join(" ");
}

function buildSearchText(item) {
  const parts = [
    item.n,
    item.title,
    item.short,
    item.modalHeading,
    item.modalSubtitle,
    ...(item.searchBody || []),
    item.helper
  ];
  return normalizeText(parts.join(" "));
}

function scoreField(text, queryWords, fullPhrase, weight) {
  const norm = normalizeText(text);
  if (!norm) return 0;

  let score = 0;
  if (fullPhrase.length >= 2 && norm.includes(fullPhrase)) score += weight * 0.55;

  let matchedWords = 0;
  queryWords.forEach((word) => {
    if (word.length < 2 && !/^\d+$/.test(word)) return;
    if (norm.includes(word)) {
      score += weight * 0.18;
      matchedWords += 1;
    }
    norm.split(/\s+/).forEach((token) => {
      if (token.startsWith(word) && word.length >= 2) score += weight * 0.12;
    });
  });

  if (queryWords.length > 1 && matchedWords === queryWords.length) score += weight * 0.22;
  return score;
}

function scoreItem(item, index, query) {
  const fullPhrase = normalizeText(query);
  if (!fullPhrase) return 0;

  const expanded = expandAliases(query);
  const queryWords = Array.from(
    new Set(
      expanded
        .split(/\s+/)
        .concat(fullPhrase.split(/\s+/))
        .filter((w) => w.length > 0)
    )
  );

  let score = 0;
  score += scoreField(item.title, queryWords, fullPhrase, 90);
  score += scoreField(item.modalHeading, queryWords, fullPhrase, 90);
  score += scoreField(item.short, queryWords, fullPhrase, 75);
  score += scoreField(item.modalSubtitle, queryWords, fullPhrase, 70);
  score += scoreField((item.searchBody || []).join(" "), queryWords, fullPhrase, 55);
  score += scoreField(item.helper, queryWords, fullPhrase, 45);

  const nNorm = item.n.replace(/^0+/, "") || item.n;
  queryWords.forEach((word) => {
    if (word === nNorm || word === item.n) score += 200;
    if (/^\d+$/.test(word) && (nNorm === word || item.n === word.padStart(2, "0"))) score += 200;
  });

  const corpus = buildSearchText(item);
  if (corpus.includes(fullPhrase)) score += 35;

  return score;
}

function getSearchResults(query) {
  const trimmed = (query || "").trim();
  if (!trimmed) return items.map((item, index) => ({ index, item, score: 0 }));

  return items
    .map((item, index) => ({ index, item, score: scoreItem(item, index, trimmed) }))
    .filter((row) => row.score > 0)
    .sort((a, b) => b.score - a.score || Number(a.item.n) - Number(b.item.n));
}

function isStrongSingleResult(results) {
  if (!results.length) return false;
  if (results.length === 1) return results[0].score >= 35;
  const top = results[0].score;
  const second = results[1].score;
  return top >= 50 && top >= second * 1.4 && top - second >= 12;
}

function applySearch(query, options = {}) {
  const { openTopIfStrong = false, openTopOnEnter = false } = options;
  const trimmed = (query || "").trim();

  clearBtn.hidden = !trimmed;

  if (!trimmed) {
    lastSearchResults = items.map((item, index) => ({ index, item, score: 0 }));
    renderGrid(lastSearchResults);
    renderSuggestions([]);
    return lastSearchResults;
  }

  lastSearchResults = getSearchResults(trimmed);
  renderGrid(lastSearchResults);
  renderSuggestions(lastSearchResults);

  if (openTopOnEnter || openTopIfStrong) {
    if (lastSearchResults.length && (openTopOnEnter || isStrongSingleResult(lastSearchResults))) {
      openModal(lastSearchResults[0].index);
    }
  }

  return lastSearchResults;
}

function stopVoiceSearch() {
  voiceListening = false;
  voiceBtn.classList.remove("listening");
  if (speechRecognition) {
    try { speechRecognition.stop(); } catch (err) { /* ignore */ }
  }
}

function initVoiceSearch() {
  if (!SpeechRecognitionCtor) {
    voiceUnsupported.hidden = false;
    voiceUnsupported.textContent = "Voice search is not supported on this browser. Please type a few words.";
    voiceBtn.disabled = true;
    voiceBtn.style.opacity = "0.55";
    return;
  }

  speechRecognition = new SpeechRecognitionCtor();
  speechRecognition.continuous = false;
  speechRecognition.interimResults = false;
  speechRecognition.lang = "en-GB";

  speechRecognition.onstart = () => {
    voiceListening = true;
    voiceBtn.classList.add("listening");
    voiceStatus.hidden = false;
    voiceStatus.textContent = "Listening...";
    voiceUnsupported.hidden = true;
  };

  speechRecognition.onresult = (event) => {
    const transcript = Array.from(event.results).map((r) => r[0].transcript).join(" ").trim();
    if (transcript) {
      searchInput.value = transcript;
      applySearch(transcript, { openTopIfStrong: true });
    }
  };

  speechRecognition.onerror = () => {
    stopVoiceSearch();
    voiceStatus.textContent = "Voice input ended. Try again or type your search.";
  };

  speechRecognition.onend = () => {
    stopVoiceSearch();
  };
}

function startVoiceSearch() {
  if (!SpeechRecognitionCtor) {
    voiceUnsupported.hidden = false;
    voiceUnsupported.textContent = "Voice search is not supported on this browser. Please type a few words.";
    return;
  }

  if (!speechRecognition) initVoiceSearch();

  try {
    if (voiceListening) {
      stopVoiceSearch();
      return;
    }
    speechRecognition.start();
  } catch (err) {
    voiceStatus.hidden = false;
    voiceStatus.textContent = "Could not start microphone. Please type your search.";
    stopVoiceSearch();
  }
}

function clearSearch() {
  searchInput.value = "";
  clearBtn.hidden = true;
  stopVoiceSearch();
  voiceStatus.hidden = true;
  lastSearchResults = items.map((item, index) => ({ index, item, score: 0 }));
  renderGrid(lastSearchResults);
  renderSuggestions([]);
  searchInput.focus();
}

      '<p style="margin-bottom: 22px; padding-left: 8px;">• Elisence is designed to adapt market by market — with multilingual experiences, country-aware healthcare logic, modular architecture, and healthcare-aware governance.</p>' +

      '<p style="margin-bottom: 12px; padding-left: 8px;">• Our approach is practical and trust-led: validate locally, build institutional credibility, and scale responsibly.</p>' +

      '<p style="margin-bottom: 22px; padding-left: 8px;">• Europe provides access to mature healthcare markets, while the Gulf and wider Middle East are highly relevant because of healthcare transformation priorities, prevention focus, and digital health investment.</p>' +

      '<p style="margin-bottom: 12px; padding-left: 8px;">• The goal is not to launch everywhere at once.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• The goal is to build a repeatable, trusted, and compliant expansion model — prove trust locally, then scale responsibly.</p>' +

  } else if (item.n === "10") {
    document.getElementById("modalAnswer").innerHTML =
      '<p class="deck-subtitle">Why Elisence exists</p>' +
      '<p style="margin-bottom: 22px;">Elisence started from a simple observation: healthcare often feels fragmented, stressful, and difficult to navigate.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">BACKGROUND &amp; EXPERIENCE</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Through experience across engineering, legal, business, and care services — including home and domiciliary care — I saw how disconnected health experiences can become for people and families.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Over time, this became more personal. I kept asking a simple question:<br><br>Why should managing health feel so fragmented, reactive, and difficult to understand?</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">A PERSONAL MISSION</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Elisence is named after and inspired by my daughter, Elisa — reflecting a long-term ambition to help build a safer, more connected, and more human future for healthcare.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• The mission is not simply to build another health app, but to rethink how prevention, continuity, trust, intelligence, and human support can work together.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">BUILDING DIFFERENTLY</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Elisence has been built in a highly focused and lean way, supported by modern AI collaboration tools to accelerate research, architecture, product thinking, and development workflows — while keeping responsibility, direction, and decision-making grounded in human judgment.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• The vision is large, but execution is practical: build trust, validate responsibly, and scale step by step.</p>' +
      '<p style="margin-bottom: 0; font-weight: 850; text-align: center;">Elisence began as a personal mission — and is being built as a long-term healthcare mission.</p>' +
      '<p class="placeholder-note" style="margin-top: 28px; padding-top: 22px; border-top: 1px solid rgba(120, 210, 255, .24); font-style: italic; text-align: center;">Mission → credibility → responsibility → long-term execution</p>';
  } else if (item.n === "11") {
    document.getElementById("modalAnswer").innerHTML =
      '<p class="deck-subtitle">A future where healthcare stays connected</p>' +
      '<p style="margin-bottom: 18px; font-weight: 850;">We believe healthcare should not only exist when people are ill.</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Today, many health experiences are episodic — fragmented moments of appointments, monitoring, medication, or illness that often disappear once the immediate need ends.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• People are expected to manage health across disconnected systems, repeated friction, confusing information, and isolated tools.</p>' +
      '<p style="margin-bottom: 8px; font-weight: 850;">We believe healthcare should feel continuous.</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• A future where prevention matters more, continuity becomes normal, and people remain connected to their health journeys before, during, and after illness.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• A future where managing health feels more human, understandable, social, trusted, and supportive — not stressful, isolating, or permanently medicalised.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">Why Elisence</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Elisence is designed as a continuous health relationship layer — where prevention, medical intelligence, wellbeing, social health, medication continuity, doctor communication, trusted guidance, chronic care, and long-term understanding can work together in one connected experience.</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• At the centre is an advanced social health ecosystem — helping people stay engaged with health in a natural, supportive, and human way rather than only during moments of illness.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• At the same time, Elisence is designed to support hospitals, clinicians, pharmacies, governments, and healthcare systems with better continuity, participation, and trusted long-term health engagement.</p>' +
      '<p style="margin-bottom: 14px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #8edcff;">The Ambition</p>' +
      '<p style="margin-bottom: 12px; padding-left: 8px;">• Build responsibly. Earn trust locally. Scale globally.</p>' +
      '<p style="margin-bottom: 22px; padding-left: 8px;">• Help move healthcare from fragmented and reactive → toward connected, preventive, and continuously supportive experiences.</p>' +
      '<p style="margin-bottom: 12px; font-weight: 850; text-align: center;">Most digital health systems engage people when they are ill.</p>' +
      '<p style="margin-bottom: 0; font-weight: 850; text-align: center;">Elisence is designed to stay valuable before, during, and after illness.</p>' +
      '<p class="placeholder-note" style="margin-top: 28px; padding-top: 22px; border-top: 1px solid rgba(120, 210, 255, .24); font-style: italic; text-align: center;">Continuity → trust → engagement → prevention → human healthcare</p>';
  } else {
    document.getElementById("modalAnswer").innerHTML =
      '<p class="deck-subtitle">Deck slide skeleton</p>' +
      '<p class="placeholder-note">Deck slide content will be drafted next.</p>';
  }
  modalEl.classList.add("show");
}

function closeModal() {
  modalEl.classList.remove("show");
}

document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  if (modalEl.classList.contains("show")) {
    closeModal();
    return;
  }
  if (searchInput.value.trim()) {
    clearSearch();
  }
});

searchInput.addEventListener("input", () => {
  applySearch(searchInput.value);
});

searchInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    applySearch(searchInput.value, { openTopOnEnter: true });
  }
});

clearBtn.addEventListener("click", clearSearch);
voiceBtn.addEventListener("click", startVoiceSearch);

renderGrid(items.map((item, index) => ({ index, item, score: 0 })));
initVoiceSearch();
  </script>
</body>
