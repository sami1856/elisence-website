<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elisence — Founder Pitch System</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #061936 0%, #020816 48%, #000 100%);
      color: #fff;
      overflow-y: auto;
    }

    .board {
      width: 100vw;
      min-height: 100vh;
      padding: 18px 22px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header-wrap {
      position: relative;
      flex: 0 0 auto;
      width: 100%;
    }

    .nav-pill {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .06em;
      text-decoration: none;
      color: #dff5ff;
      border-radius: 999px;
      border: 1px solid rgba(120, 220, 255, .85);
      background:
        radial-gradient(circle at 30% 20%, rgba(0, 220, 255, .35), transparent 55%),
        rgba(0, 80, 160, .28);
      box-shadow: 0 0 22px rgba(0, 190, 255, .55);
      transition: transform .15s ease, box-shadow .15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-pill:hover,
    .nav-pill:focus-visible {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 0 32px rgba(0, 220, 255, .85);
      outline: 2px solid rgba(0, 220, 255, .5);
      outline-offset: 2px;
    }

    .header {
      text-align: center;
      flex: 0 0 auto;
    }

    .brand {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 0.28em;
      color: #ffffff;
      text-shadow: 0 0 28px rgba(0,180,255,.9);
    }

    .subtitle {
      margin-top: 4px;
      font-size: 17px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #8edcff;
    }

    .description {
      margin-top: 12px;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
      font-size: clamp(15px, 1.1vw, 18px);
      line-height: 1.45;
      font-weight: 620;
      color: rgba(180, 230, 255, .88);
      padding: 0 12px;
    }

    .grid {
      flex: 0 0 auto;
      width: min(1280px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 1fr;
      gap: 18px;
      align-content: start;
    }

    .card {
      border: 1px solid rgba(95, 205, 255, .75);
      border-radius: 22px;
      background:
        radial-gradient(circle at top left, rgba(0,190,255,.34), transparent 45%),
        linear-gradient(145deg, rgba(8,34,85,.96), rgba(4,12,34,.98));
      box-shadow:
        0 0 22px rgba(0,160,255,.65),
        inset 0 0 20px rgba(255,255,255,.04);
      padding: 16px;
      min-height: 158px;
      height: 100%;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: .18s ease;
    }

    .card:hover {
      transform: translateY(-3px) scale(1.015);
      box-shadow:
        0 0 34px rgba(0, 210, 255, .95),
        0 0 70px rgba(80, 80, 255, .45);
    }

    .num {
      font-size: 17px;
      font-weight: 900;
      color: #55d9ff;
      letter-spacing: .12em;
      text-align: center;
    }

    .q {
      font-size: clamp(16px, 1.18vw, 23px);
      line-height: 1.06;
      font-weight: 900;
      color: #ffffff;
      text-align: center;
      text-shadow: 0 0 18px rgba(0,170,255,.5);
    }

    .tag {
      margin-top: 12px;
      font-size: 13.5px;
      line-height: 1.35;
      font-weight: 650;
      color: rgba(180, 230, 255, .9);
      opacity: .94;
      text-align: center;
      letter-spacing: .01em;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 34px;
      background: rgba(0, 0, 0, .82);
      backdrop-filter: blur(12px);
    }

    .modal.show { display: flex; }

    .panel {
      position: relative;
      width: min(1500px, 96vw);
      height: min(850px, 92vh);
      border-radius: 34px;
      border: 1px solid rgba(110, 220, 255, .9);
      background:
        radial-gradient(circle at top, rgba(0,160,255,.28), transparent 42%),
        linear-gradient(145deg, #06193a, #020716 72%);
      box-shadow:
        0 0 55px rgba(0,190,255,.8),
        0 0 140px rgba(90,80,255,.45);
      padding: 34px 42px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      overflow: hidden;
    }

    .modal-top {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 16px;
      flex: 0 0 auto;
      padding-right: 4px;
    }

    .modal-title {
      font-size: clamp(34px, 3.2vw, 58px);
      line-height: 1.08;
      font-weight: 950;
      color: #fff;
      padding-right: 8px;
      word-break: break-word;
    }

    .close {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      min-width: 56px;
      min-height: 56px;
      padding: 0;
      border: 1px solid rgba(120, 220, 255, .95);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      line-height: 1;
      font-weight: 900;
      color: #fff;
      background:
        radial-gradient(circle at 30% 25%, rgba(0, 220, 255, .4), transparent 55%),
        rgba(0, 120, 200, .35);
      cursor: pointer;
      box-shadow:
        0 0 24px rgba(0, 190, 255, .75),
        inset 0 0 12px rgba(255, 255, 255, .06);
      transition: transform .15s ease, box-shadow .15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .close:hover,
    .close:focus-visible {
      transform: scale(1.05);
      box-shadow: 0 0 32px rgba(0, 220, 255, .95);
      outline: 2px solid rgba(0, 220, 255, .6);
      outline-offset: 2px;
    }

    .close:active {
      transform: scale(0.97);
    }

    .answer {
      flex: 1;
      overflow-y: auto;
      padding-right: 8px;
      font-size: clamp(28px, 2.15vw, 42px);
      line-height: 1.32;
      font-weight: 650;
      color: #eaf8ff;
    }

    .answer p { margin-bottom: 22px; }

    .placeholder-note {
      color: rgba(180, 230, 255, .75);
      font-style: italic;
    }

    .pitch-subtitle {
      font-size: clamp(20px, 1.45vw, 30px);
      line-height: 1.22;
      font-weight: 850;
      color: #8edcff;
      margin-bottom: 20px;
      letter-spacing: .04em;
    }

    .pitch-helper {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(120, 210, 255, .24);
      font-size: clamp(17px, 1.2vw, 22px);
      line-height: 1.4;
      font-weight: 650;
      color: rgba(150, 210, 255, .82);
      font-style: italic;
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        width: min(720px, 100%);
      }
      .card { min-height: 150px; }
      .modal { padding: 12px; }
      .panel { padding: 22px 18px; height: min(92vh, 92dvh); }
      .close {
        width: 52px;
        height: 52px;
        min-width: 52px;
        min-height: 52px;
        font-size: 32px;
      }
    }

    @media (max-width: 768px) {
      .nav-pill {
        position: static;
        align-self: flex-start;
        margin-bottom: 10px;
        font-size: 12px;
        padding: 9px 14px;
      }

      .header-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>
  <main class="board">
    <div class="header-wrap">
      <a href="web-summit-board.html" class="nav-pill">&larr; Founder Quick Board</a>
      <header class="header">
        <div class="brand">ELISENCE</div>
        <div class="subtitle">Founder Pitch System</div>
        <p class="description">Pitch modes for Web Summit, investors, healthcare, partnerships, and global growth.</p>
      </header>
    </div>

    <section class="grid" id="grid"></section>
  </main>

  <div class="modal" id="modal">
    <div class="panel">
      <div class="modal-top">
        <div class="modal-title" id="modalTitle"></div>
        <button type="button" class="close" onclick="closeModal()" aria-label="Close">&times;</button>
      </div>
      <div class="answer" id="modalAnswer"></div>
    </div>
  </div>

  <script>
const items = [
  {
    n:"01",
    title:"Orbit Pitch (5 sec)",
    short:"Fast memorable intro for immediate curiosity",
    modalHeading:"Orbit Pitch",
    modalSubtitle:"5–8 second fast introduction",
    body:[
      "Elisence connects people, healthcare, and trusted health intelligence into one human-centred ecosystem."
    ],
    helper:"Designed for immediate curiosity and fast understanding."
  },
  {
    n:"02",
    title:"Elevator Pitch (20–30 sec)",
    short:"Short clear value in under half a minute",
    modalHeading:"Elevator Pitch",
    modalSubtitle:"20–30 second founder explanation",
    body:[
      "Elisence is a human-centred health ecosystem designed to make healthcare feel less fragmented, more connected, and easier to navigate.",
      "For people, it brings many parts of health into one trusted experience — from prevention, chronic conditions, medical tracking, medication, metabolic and weight journeys, women's health, wellbeing, family care, and trusted health intelligence.",
      "At the same time, Elisence is designed to help healthcare systems, clinics, insurers, governments, researchers, and universities support better continuity, prevention, and more connected health experiences."
    ],
    helper:"Whole elephant. Both sides. Simple enough to say naturally."
  },
  {
    n:"03",
    title:"Founder Pitch (60 sec)",
    short:"Founder story plus problem and direction",
    modalHeading:"Founder Pitch",
    modalSubtitle:"45–60 second founder explanation",
    body:[
      "Healthcare today often feels fragmented, reactive, and difficult for ordinary people to navigate. People use disconnected tools for medication, prevention, chronic conditions, wellbeing, and medical support — while healthcare systems also struggle with continuity and connected understanding.",
      "Elisence is our answer to that problem: a human-centred health ecosystem designed to make healthcare feel more connected, trusted, and easier to navigate.",
      "For people, Elisence brings many parts of health into one experience — from prevention, medical tracking, chronic conditions, medication, metabolic and weight journeys, women's health, wellbeing, family care, and trusted health intelligence.",
      "At the same time, Elisence is designed to support healthcare systems, clinics, insurers, governments, researchers, and universities through better continuity, prevention, and connected health experiences.",
      "Personally, this mission is deeply important to me. My background spans engineering, legal, business, and care services, and Elisence is also inspired by my daughter, Elisa — with a long-term ambition to help make health feel safer, more human, and easier to navigate."
    ],
    helper:"Problem → Elisence → Two flips → Founder story"
  },
  {
    n:"04",
    title:"Investor Pitch (90–120 sec)",
    short:"Problem, solution, traction, and ask",
    modalHeading:"Investor Pitch",
    modalSubtitle:"90–120 second investor explanation",
    body:[
      "Healthcare today is fragmented, reactive, and increasingly difficult for both people and systems to navigate. People manage medication, prevention, chronic conditions, wellbeing, and medical information across disconnected tools, while healthcare systems struggle with continuity, rising demand, and growing complexity.",
      "We believe we are at a turning point. Healthcare is moving toward prevention, continuity, personalisation, and more patient participation — while healthcare systems are under pressure to become smarter, more connected, and more efficient.",
      "Elisence is our answer to that shift: a human-centred health ecosystem designed to make healthcare feel less fragmented, more trusted, and easier to navigate.",
      "For people, Elisence brings together prevention, chronic conditions, diabetes and metabolic journeys, medical tracking, medication continuity, women's health, wellbeing, family care, trusted health intelligence, and a social health experience that helps people stay engaged over time rather than interacting with health only when something goes wrong.",
      "At the same time, Elisence is designed to support hospitals, clinics, insurers, governments, universities, researchers, and responsible healthcare organisations through better continuity, prevention, and connected health experiences.",
      "What makes Elisence different is not one feature — it is how we think about health. We are building for continuity rather than isolated moments of illness, with a modular and globally adaptable system designed to evolve across different countries, healthcare realities, and regulatory expectations.",
      "Commercially, we see a trust-first model combining premium consumer experiences, B2B, B2B2C, and B2G partnerships — while keeping people at the centre of the experience.",
      "Personally, this mission is deeply important to me. My background spans engineering, legal, business, and care services, and Elisence reflects a long-term ambition to help make health feel more connected, human, and easier to navigate."
    ],
    helper:"Problem → Why now → Elisence → Two flips → Moat → Business model → Founder credibility"
  },
  {
    n:"05",
    title:"Health System / Government Pitch",
    short:"Continuity, prevention, and system value",
    modalHeading:"Health System / Government Pitch",
    modalSubtitle:"90–120 second healthcare system and public sector explanation",
    body:[
      "Healthcare systems everywhere are under pressure — rising chronic conditions, ageing populations, fragmented care journeys, growing cost pressures, and increasing expectations around prevention and continuity.",
      "At the same time, people are often asked to manage medication, prevention, chronic conditions, wellbeing, and medical information across disconnected systems that rarely work together in a meaningful way.",
      "Elisence is designed as a human-centred and globally adaptable health ecosystem that helps make healthcare feel more connected, trusted, and easier to navigate — while supporting better continuity between people and healthcare systems.",
      "For people, Elisence brings many parts of health into one experience, including prevention, medical tracking, chronic condition support, metabolic and weight journeys, medication continuity, women’s health, wellbeing, family care, and trusted health intelligence.",
      "What matters to healthcare systems is continuity and engagement. Many health tools are only used during illness or short episodes of care, but Elisence is designed for long-term participation — helping people stay engaged with health in everyday life rather than only during crisis.",
      "Over time, this can help support better prevention, more connected care experiences, trusted communication, and a stronger understanding of long-term health journeys.",
      "Elisence is also designed with responsible governance in mind — adapting across healthcare systems, regional expectations, privacy requirements, and international safety thinking rather than assuming one model fits everyone.",
      "We do not see Elisence as replacing healthcare systems. We see it as helping people and systems work together more continuously, intelligently, and humanely."
    ],
    helper:"Healthcare pressure → continuity → prevention → engagement → governance → human-centred ecosystem"
  },
  { n:"06", title:"Pharma / University / Clinic Pitch", short:"Partnership value for institutions" },
  { n:"07", title:"Why Elisence? (Human Story)", short:"Personal mission and human motivation" },
  { n:"08", title:"Recovery / Difficult Questions", short:"Calm responses under pressure" },
  { n:"09", title:"Web Summit Interview Mode", short:"Stage-ready concise answers" },
  { n:"10", title:"3-Minute Pitch", short:"Full structured founder pitch flow" },
  { n:"11", title:"Investor Deck Structure", short:"Slide order and narrative spine" },
  { n:"12", title:"Closing / Why Care?", short:"Memorable ending that invites action" }
];

const grid = document.getElementById("grid");
const modalEl = document.getElementById("modal");

items.forEach((item, index) => {
  const card = document.createElement("button");
  card.type = "button";
  card.className = "card";
  card.onclick = () => openModal(index);
  card.innerHTML = `
    <div class="num">${item.n}</div>
    <div class="q">${item.title}</div>
    <div class="tag">${item.short}</div>
  `;
  grid.appendChild(card);
});

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function openModal(index) {
  const item = items[index];
  const heading = item.modalHeading || item.title;
  document.getElementById("modalTitle").textContent = item.n + " — " + heading;

  if (item.body && item.body.length) {
    let html = "";
    if (item.modalSubtitle) {
      html += `<p class="pitch-subtitle">${escapeHtml(item.modalSubtitle)}</p>`;
    }
    item.body.forEach((paragraph) => {
      html += `<p>${escapeHtml(paragraph)}</p>`;
    });
    if (item.helper) {
      html += `<p class="pitch-helper">${escapeHtml(item.helper)}</p>`;
    }
    document.getElementById("modalAnswer").innerHTML = html;
  } else {
    document.getElementById("modalAnswer").innerHTML =
      '<p class="placeholder-note">Pitch content drafting in progress.</p><p class="placeholder-note">Content coming soon.</p>';
  }

  modalEl.classList.add("show");
}

function closeModal() {
  modalEl.classList.remove("show");
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && modalEl.classList.contains("show")) {
    closeModal();
  }
});
  </script>
</body>
</html>
